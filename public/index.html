    <link href="site.css" rel="stylesheet">
    <script type="text/javascript">
      function selectLang(lang, supportedLangs = new Set(['en', 'es'])) {
        const l = lang.slice(0, 2);
        return supportedLangs.has(l) && l || 'en';
      }
      window.location = "index." + selectLang(navigator.language) + ".html";
    </script>
  </head>

        🇬🇧

          English
        </a>
      </div>
      <div class="p-3">

        <a href="index.es.html">
          Español
        </a>
      </div>
    </div>
  </body>
</html>
